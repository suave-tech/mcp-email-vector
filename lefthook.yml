# Lefthook config — installed on `npm install` via the "prepare" script.
# Hooks block the commit/push on non-zero exit. Override with LEFTHOOK=0 (emergency only).

pre-commit:
  parallel: true
  commands:
    biome:
      # Format + lint + organize-imports, auto-fix safe issues, re-stage.
      glob: "*.{ts,js,json}"
      run: npx biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true

    typecheck:
      # Only run if TS files changed. tsc is project-wide (no per-file mode).
      glob: "*.ts"
      run: npm run typecheck

pre-push:
  parallel: false
  commands:
    typecheck:
      run: npm run typecheck
    test:
      run: npm test
    lint:
      run: npm run check

# Skip hooks by setting LEFTHOOK=0 or passing --no-verify. Do not do this casually.
