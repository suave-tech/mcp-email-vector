services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: vector_email
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d vector_email"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://user:pass@postgres:5432/vector_email
    depends_on:
      postgres:
        condition: service_healthy
    command: ["node", "dist/db/migrate.js"]
    restart: "no"

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://user:pass@postgres:5432/vector_email
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["node", "dist/index.js"]

  worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://user:pass@postgres:5432/vector_email
      REDIS_URL: redis://redis:6379
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["node", "dist/queue/worker.js"]

  scheduler:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://user:pass@postgres:5432/vector_email
      REDIS_URL: redis://redis:6379
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["node", "dist/queue/scheduler.js"]

volumes:
  pgdata:
