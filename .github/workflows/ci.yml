name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install root deps
        run: pnpm install --frozen-lockfile

      - name: Biome (lint + format + organize-imports)
        run: pnpm run check

      - name: Typecheck (root)
        run: pnpm run typecheck

      - name: Tests
        run: pnpm test

  mcp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: mcp/pnpm-lock.yaml

      - name: Install MCP deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck MCP
        run: pnpm run typecheck

      - name: Build MCP
        run: pnpm run build
