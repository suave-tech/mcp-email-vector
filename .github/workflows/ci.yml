name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Biome (lint + format + organize-imports)
        run: npm run check

      - name: Typecheck (root)
        run: npm run typecheck

      - name: Tests
        run: npm test

  mcp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp/package-lock.json

      - name: Install MCP deps
        run: npm install

      - name: Typecheck MCP
        run: npm run typecheck

      - name: Build MCP
        run: npm run build
